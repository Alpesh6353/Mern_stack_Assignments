<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cont{
          background-color: rgb(191, 190, 189);
            width: 80vw;
            height: 80vh;
            margin-top: 8vh;
            margin-left: 8vw;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr;
            grid-gap:15px;
            padding: 15px;
            border: 2px solid rgb(85, 84, 84);
            border-radius: 10px;
        }
        .box{
            background-color: azure;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            border: 3px solid black;
        }
        #box1{
            grid-column: 1/5;
            grid-row:1/3;
        }
        #box4{
            grid-column: 5;
            grid-row: 1;
        }
        #box5{
            grid-column: 6;
            grid-row: 1;
        }
        #box6{
            grid-column: 6;
            grid-row: 2;
        }
        #box3{
            grid-row:3/7;
            grid-column: 1/7;
        }
        #box2{
            grid-column: 4;
            grid-row: 2;
            grid-row: 2/5;
            grid-column: 4/6;
        }
    </style>
</head>
<body>
     <div class="cont">
        <div class="box" id="box1">1</div>
        <div class="box" id="box3">3</div>
        <div class="box" id="box2">2</div>
        <div class="box" id="box4">4</div>
        <div class="box" id="box5">5</div>
        <div class="box" id="box6">6</div>
    </div>
</body>
</html>
