<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cont{
            background-color: rgb(191, 190, 189);
            width: 80vw;
            height: 80vh;
            margin-top: 5vh;
            margin-left: 5vw;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-gap:15px;
            padding: 5px;
            border: 2px solid rgb(85, 84, 84);
            border-radius: 10px;
            
        }
        .box{
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            border: 2px solid lightblue ;
        }
        #box1{
            background-color: rgb(243, 75, 75);
            grid-column-start: 1;
            grid-column-end: 5;
        }
        #box2{
            background-color: yellowgreen;
        }
        #box3{
            background-color: burlywood;
            grid-column-start: 2;
            grid-column-end: 5;
        }
        #box4{
            background-color: orange;
            grid-column-start: 1;
            grid-column-end: 5;
        }
    </style>
</head>
<body>
    <div class="cont">
        <div class="box" id="box1">Header</div>
        <div class="box" id="box2">Content</div>
        <div class="box" id="box3">Content</div>
        <div class="box" id="box4">Footer</div>
    </div>
</body>
</html>
