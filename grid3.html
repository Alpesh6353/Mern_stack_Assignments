<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cont{
          background-color: rgb(191, 190, 189);
            width: 80vw;
            height: 80vh;
            margin-top: 8vh;
            margin-left: 8vw;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 0.4fr 1fr 0.4fr;
            grid-gap:15px;
            padding: 15px;
            border: 2px solid rgb(85, 84, 84);
            border-radius: 10px;
        }
        .box{
            background-color: azure;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;

        }
        #box1{
            grid-column: 1/4;
        }
        #box5{
            grid-column: 1/4;
        }
    </style>
</head>
<body>
    <div class="cont">
        <div class="box" id="box1">Header</div>
        <div class="box" id="box2">Navigation</div>
        <div class="box" id="box3">Article</div>
        <div class="box" id="box4">Sidebar</div>
        <div class="box" id="box5">Footer</div>
    </div>
</body>
</html>
