<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
        }
        h1{
            text-align: center;
            color: aliceblue;
        }
        .main{
            width: 70vw;
            height: 50vh;
            margin-top: 4%;
            margin-left: 13%;
            display: grid;
            grid-template-columns: 30% 30% 30%;
            justify-content: space-evenly;
        }
        .box{
            background-color: blue;
            border-radius: 10px;
        }
        .btn3{
            position: relative;
            left: 44%;
            top: 10vh;
            width: 13vw;
            height: 7vh;
            border-radius: 25px;
        }
        .btn{
            height: 25px;
            position: relative;
            bottom: 6px;
            border-radius: 5px;
        }
        .btn2{
            color: aliceblue;
            background-color: black;
            height: 25px;
            position: relative;
            bottom: 6px;
             border-radius: 5px;
        }
        .image{
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>IFTTT
         <button class="btn">Pro</button>
         <button class="btn2">and</button>
         <button class="btn">Pro+</button><br>
        Make your Applets more <br> powerful
    </h1>
    <div class="main">
        <div class="box">
            <img class="image" src="/ifttt_img1.png">
        </div>
        <div class="box">
            <img class="image" src="/ifttt_img2.png">
        </div>
        <div class="box">
            <img class="image" src="/ifttt_img3.png">
        </div>
    </div>
    <button class="btn3">Start your free trial</button>
</body>
</html>
