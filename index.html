<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{

            height: 90vh;
            width: 80vw;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
            margin-top: 5vh;
            margin-left: 5vw;
            grid-gap:15px;
            padding: 5px;
        }
        .box{
            background-color: antiquewhite;
            border: 2px solid black;
            border-radius: 15px;
            align-content: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #box2{
            grid-column: 2;
            grid-row-start: 1;
            grid-row-end: 3;
        }
        #box3{
            grid-column-start: 3;
            grid-column-end: 5;
        }
        #box6{
            grid-column: 3;
            grid-column-start: 3;
            grid-column-end: 5;
            grid-row-start: 2;
            grid-row-end: 4;
        }
        #box7{
            grid-column: 1;
            grid-row: 2;
        }
        #box8{
            grid-row-start: 2;
            grid-row-end: 4;
        }
        #box9{
            grid-column: 1;
            grid-row: 3;
            grid-column-start: 1;
            grid-column-end: 3;
        }
        .cir{
            height: 20px;
            width: 20px;
            background-color: aqua;
            border-radius: 50%;
            position:relative;
            left: 71.6vw;
            bottom: 62.5vh;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1">1</div>
        <div class="box" id="box2">2</div>
        <div class="box" id="box3">3</div>
        <div class="box" id="box4">4</div>
        <div class="box" id="box5">5</div>
        <div class="box" id="box6">6</div>
        <div class="box" id="box7">7</div> 
        <div class="box" id="box8">8</div>
        <div class="box" id="box9">9</div>
        <div class="box" id="box10">10</div>
        <div class="box" id="box11">11</div>
    </div>
    <div class="cir"></div>
</body>
</html>
